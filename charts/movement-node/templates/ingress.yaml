{{- if .Values.ingress.enabled }}
{{- if or (eq .Values.node.type "vfn") (eq .Values.node.type "fullnode") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "movement-node.fullname" . }}
  labels:
    {{- include "movement-node.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
    {{- end }}
    {{- if .Values.ingress.tls.enabled }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | default "nginx" }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hostname }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName }}
      {{- else if .Values.ingress.tls.wildcardSecretName }}
      secretName: {{ .Values.ingress.tls.wildcardSecretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "movement-node.fullname" . }}
                port:
                  number: {{ .Values.service.ports.api }}
{{- end }}
{{- end }}
