apiVersion: v1
kind: Service
metadata:
  name: {{ include "movement-node.fullname" . }}
  labels:
    {{- include "movement-node.labels" . | nindent 4 }}
{{- if .Values.service.annotations }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
{{- else if and (or (eq .Values.node.type "vfn") (eq .Values.node.type "fullnode")) (not .Values.ingress.enabled) .Values.loadBalancer.annotations }}
  annotations:
    {{- toYaml .Values.loadBalancer.annotations | nindent 4 }}
{{- end }}
spec:
{{- if .Values.service.type }}
  type: {{ .Values.service.type }}
{{- else if eq .Values.node.type "validator" }}
  type: ClusterIP
{{- else if .Values.ingress.enabled }}
  type: ClusterIP
{{- else }}
  type: LoadBalancer
{{- end }}
  selector:
    {{- include "movement-node.selectorLabels" . | nindent 4 }}
  ports:
{{- if eq .Values.node.type "validator" }}
  - name: validator
    port: {{ .Values.service.ports.validator }}
    targetPort: {{ .Values.service.ports.validator }}
    protocol: TCP
  - name: vfn
    port: {{ .Values.service.ports.vfn }}
    targetPort: {{ .Values.service.ports.vfn }}
    protocol: TCP
  - name: api
    port: {{ .Values.service.ports.api }}
    targetPort: {{ .Values.service.ports.api }}
    protocol: TCP
{{- else }}
  - name: api
    port: {{ .Values.service.ports.api }}
    targetPort: {{ .Values.service.ports.api }}
    protocol: TCP
  - name: p2p
    port: {{ .Values.service.ports.p2p }}
    targetPort: {{ .Values.service.ports.p2p }}
    protocol: TCP
{{- end }}
{{- if .Values.service.enableMetrics }}
  - name: metrics
    port: {{ .Values.service.ports.metrics }}
    targetPort: {{ .Values.service.ports.metrics }}
    protocol: TCP
{{- end }}
  sessionAffinity: None
{{- if eq .Values.node.type "validator" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "movement-node.fullname" . }}-public
  labels:
    {{- include "movement-node.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.loadBalancer.annotations | nindent 4 }}
spec:
  type: LoadBalancer
  selector:
    {{- include "movement-node.selectorLabels" . | nindent 4 }}
  ports:
  - name: validator
    port: {{ .Values.service.ports.validator }}
    targetPort: {{ .Values.service.ports.validator }}
    protocol: TCP
{{- end }}
